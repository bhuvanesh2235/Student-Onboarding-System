# ═══════════════════════════════════════════════════════════════════
#  Student Onboarding System – Docker Compose
#
#  Sensitive credentials are loaded from the root .env file.
#  Copy .env.example → .env and set your own values before running.
#
#  Services
#  ─────────
#  postgres   – PostgreSQL 16 (port 5432)
#  backend    – Spring Boot student-service (port 8080)
#  python     – Python pipeline / service_a (no external port)
#  frontend   – React + nginx (port 3000)
#
#  All services communicate via Docker service names on the
#  "onboarding-net" bridge network. No hardcoded localhost.
#
#  Run:  docker-compose up --build
# ═══════════════════════════════════════════════════════════════════

services:

  # ── 1. PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: onboarding-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - onboarding-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── 2. Spring Boot Backend ─────────────────────────────────────
  backend:
    build:
      context: ./student-service
      dockerfile: Dockerfile
    container_name: onboarding-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Override application.properties placeholders
      SPRING_DATASOURCE_URL:      ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - onboarding-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || wget -qO- http://localhost:8080/students || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── 3. Python Pipeline (service_a) ─────────────────────────────
  python:
    build:
      context: ./service_a
      dockerfile: Dockerfile
    container_name: onboarding-python
    restart: "no"            # Run-to-completion: exit 0 when pipeline finishes
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Points to the Spring Boot container via Docker service name
      BACKEND_URL:              ${BACKEND_URL}
      PIPELINE_BATCH_SIZE:      ${PIPELINE_BATCH_SIZE:-30}
      PIPELINE_MAX_RETRIES:     ${PIPELINE_MAX_RETRIES:-3}
      PIPELINE_RETRY_DELAY:     ${PIPELINE_RETRY_DELAY:-2.0}
      PIPELINE_TOTAL_STUDENTS:  ${PIPELINE_TOTAL_STUDENTS:-120}
      PIPELINE_INVALID_RATIO:   ${PIPELINE_INVALID_RATIO:-0.15}
    networks:
      - onboarding-net

  # ── 4. React Frontend (nginx) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: onboarding-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - onboarding-net

# ── Named volumes ───────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local

# ── Shared network ──────────────────────────────────────────────
networks:
  onboarding-net:
    driver: bridge
