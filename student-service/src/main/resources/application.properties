# =========================================
# Student Onboarding Service - Configuration
# =========================================

spring.application.name=student-service
server.port=8080

# --------------- DataSource ---------------
# All values MUST be supplied via environment variables.
# Set them in the root .env file (loaded by Docker Compose) or
# as system/IDE environment variables when running locally.
# See .env.example for the full list of required variables.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tododb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:bhuvanesh181}
spring.datasource.driver-class-name=org.postgresql.Driver

# --------------- JPA / Hibernate ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Dialect is auto-detected by Hibernate 7 — do NOT set it explicitly (causes HHH90000025 WARN)
spring.jpa.open-in-view=false

# --------------- Logging ------------------
logging.level.com.bhuvanesh.onboarding=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# --------------- Swagger / OpenAPI --------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
